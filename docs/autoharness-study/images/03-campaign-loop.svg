<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-label="optimize / campaign 的可恢复自主搜索循环">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#17202a" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#14213d" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f7f9fc"/>
  <text x="70" y="72" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="38" font-weight="700" fill="#17202a">optimize / campaign 的可恢复自主搜索循环</text>
  <text x="70" y="112" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="20" fill="#5f6b7a">自主迭代的关键不是无限循环，而是候选状态机 + 预算闸门 + retry 分类 + checkpoint。</text>
<rect x="90" y="180" width="310" height="160" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="90" y="180" width="8" height="160" rx="4" fill="#2f6fed"/>
<text x="118" y="219" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">CampaignRun</text>
<text x="118" y="252" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">持久化 campaign_run_*.json</text>
<text x="118" y="276" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">保存候选、预算、租约、决策日志</text>
<rect x="500" y="180" width="310" height="160" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="500" y="180" width="8" height="160" rx="4" fill="#7557d8"/>
<text x="528" y="219" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">候选池</text>
<text x="528" y="252" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">manual_edit_plan_list 或</text>
<text x="528" y="275" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">generator_loop</text>
<text x="528" y="299" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">beam / scored 策略会先扩展候选池</text>
<rect x="910" y="180" width="310" height="160" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="910" y="180" width="8" height="160" rx="4" fill="#f28c28"/>
<text x="938" y="219" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">执行候选</text>
<text x="938" y="252" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">生成 proposal</text>
<text x="938" y="276" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">run-proposal -&gt;</text>
<text x="938" y="299" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">run-iteration</text>
<rect x="500" y="470" width="310" height="170" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="500" y="470" width="8" height="170" rx="4" fill="#0d8fa6"/>
<text x="528" y="509" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">结果分类</text>
<text x="528" y="542" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">success / failed /</text>
<text x="528" y="565" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">inconclusive / error</text>
<text x="528" y="589" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">按生成、执行、评测、预检查分类失败</text>
<rect x="910" y="470" width="310" height="170" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="910" y="470" width="8" height="170" rx="4" fill="#d94b4b"/>
<text x="938" y="509" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">重试与预算</text>
<text x="938" y="542" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">每类失败有独立重试上限</text>
<text x="938" y="566" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">检查次数、时间、成本、失败数、无提升次数</text>
<rect x="500" y="760" width="310" height="130" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="500" y="760" width="8" height="130" rx="4" fill="#f5c542"/>
<text x="528" y="799" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">评分 / Beam</text>
<text x="528" y="832" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">branch_score 排序</text>
<text x="528" y="856" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">胜出后 prune 同组未跑候选</text>
<rect x="910" y="760" width="310" height="130" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="910" y="760" width="8" height="130" rx="4" fill="#169b72"/>
<text x="938" y="799" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">自动推广</text>
<text x="938" y="832" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">stage gate 通过</text>
<text x="938" y="856" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">比 champion 更好则 promote</text>
<line x1="400" y1="260" x2="500" y2="260" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<line x1="810" y1="260" x2="910" y2="260" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<line x1="1065" y1="340" x2="655" y2="470" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<line x1="810" y1="555" x2="910" y2="555" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<line x1="655" y1="640" x2="655" y2="760" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<line x1="1065" y1="640" x2="1065" y2="760" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<line x1="500" y1="825" x2="360" y2="350" stroke="#7557d8" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
<line x1="1220" y1="825" x2="1390" y2="340" stroke="#169b72" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
<rect x="1260" y="240" width="214" height="38" rx="19" fill="#fff0da" stroke="transparent" stroke-width="2"/>
<text x="1367" y="265" text-anchor="middle" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="17" font-weight="700" fill="#f28c28">每一步 checkpoint</text>
<rect x="1290" y="575" width="162" height="38" rx="19" fill="#ffe5e5" stroke="transparent" stroke-width="2"/>
<text x="1371" y="600" text-anchor="middle" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="17" font-weight="700" fill="#d94b4b">失败可恢复，不靠记忆</text>
</svg>
