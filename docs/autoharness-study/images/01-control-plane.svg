<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-label="Autoharness 的位置：外层优化控制平面">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#17202a" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#14213d" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f7f9fc"/>
  <text x="70" y="72" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="38" font-weight="700" fill="#17202a">Autoharness 的位置：外层优化控制平面</text>
  <text x="70" y="112" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="20" fill="#5f6b7a">它不实现业务 agent，而是围绕已有 harness 建立候选生成、评测、记录和推广闭环。</text>
<rect x="80" y="190" width="310" height="190" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="80" y="190" width="8" height="190" rx="4" fill="#0d8fa6"/>
<text x="108" y="229" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">目标 Harness 仓库</text>
<text x="108" y="262" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">被优化的 agent harness /</text>
<text x="108" y="285" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">prompt / middleware /</text>
<text x="108" y="308" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">config / source</text>
<text x="108" y="332" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">autoharness 只把它当作</text>
<text x="108" y="355" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">target_root</text>
<rect x="645" y="170" width="330" height="230" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="645" y="170" width="8" height="230" rx="4" fill="#2f6fed"/>
<text x="673" y="209" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">autoharness 控制平面</text>
<text x="673" y="242" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">CLI</text>
<text x="673" y="265" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">命令：guide、run-benchmark、gen</text>
<text x="673" y="288" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">erate-proposal、run-iterati</text>
<text x="673" y="311" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">on、optimize</text>
<text x="673" y="335" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">统一管理候选、运行、比较、推广</text>
<rect x="1200" y="190" width="300" height="190" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="1200" y="190" width="8" height="190" rx="4" fill="#f28c28"/>
<text x="1228" y="229" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">Benchmark Adapter</text>
<text x="1228" y="262" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">generic_command /</text>
<text x="1228" y="285" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">pytest / harbor / tau2</text>
<text x="1228" y="308" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">/ hal / car_bench</text>
<text x="1228" y="332" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">把不同评测统一成</text>
<text x="1228" y="355" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">BenchmarkRunResult</text>
<rect x="120" y="610" width="360" height="190" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="120" y="610" width="8" height="190" rx="4" fill="#169b72"/>
<text x="148" y="649" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">.autoharness 状态层</text>
<text x="148" y="682" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">workspace.json、state.json</text>
<text x="148" y="706" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">registry/run_*.json</text>
<text x="148" y="730" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">proposals、iterations、champion.json</text>
<rect x="650" y="610" width="330" height="190" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="650" y="610" width="8" height="190" rx="4" fill="#7557d8"/>
<text x="678" y="649" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">Proposal Generator</text>
<text x="678" y="682" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">manual / failure_summary /</text>
<text x="678" y="705" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">local_template</text>
<text x="678" y="729" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">openai_responses /</text>
<text x="678" y="752" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">codex_cli / claude_code</text>
<rect x="1180" y="610" width="330" height="190" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="1180" y="610" width="8" height="190" rx="4" fill="#d94b4b"/>
<text x="1208" y="649" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">Promotion / Champion</text>
<text x="1208" y="682" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">候选达到阶段 gate</text>
<text x="1208" y="706" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">和当前 champion 比较</text>
<text x="1208" y="730" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">胜者写入 champion manifest</text>
<line x1="390" y1="285" x2="645" y2="285" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<line x1="975" y1="285" x2="1200" y2="285" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<line x1="810" y1="400" x2="810" y2="610" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<line x1="480" y1="705" x2="650" y2="705" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<line x1="980" y1="705" x2="1180" y2="705" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<line x1="1350" y1="610" x2="1350" y2="380" stroke="#d94b4b" stroke-width="2"  marker-end="url(#arrow)"/>
<line x1="645" y1="340" x2="480" y2="610" stroke="#169b72" stroke-width="2"  marker-end="url(#arrow)"/>
<rect x="703" y="465" width="266" height="38" rx="19" fill="#dfe9ff" stroke="transparent" stroke-width="2"/>
<text x="836" y="490" text-anchor="middle" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="17" font-weight="700" fill="#2f6fed">外层循环，不替代业务 harness</text>
