<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-label="一次 run-iteration 的生命周期">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#17202a" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#14213d" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f7f9fc"/>
  <text x="70" y="72" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="38" font-weight="700" fill="#17202a">一次 run-iteration 的生命周期</text>
  <text x="70" y="112" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="20" fill="#5f6b7a">单次候选从 edit_plan 到 benchmark record 的完整路径，关键点是可预览、可恢复、可追踪。</text>
<rect x="92" y="210" width="310" height="170" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="92" y="210" width="8" height="170" rx="4" fill="#2f6fed"/>
<text x="120" y="249" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#17202a">1 读取 workspace/state</text>
<text x="120" y="282" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">解析</text>
<text x="120" y="305" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">track、stage、baseline、autonomy</text>
<text x="120" y="328" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">policy</text>
<line x1="402" y1="295" x2="462" y2="295" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<rect x="462" y="210" width="310" height="170" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="462" y="210" width="8" height="170" rx="4" fill="#7557d8"/>
<text x="490" y="249" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#17202a">2 生成 proposal</text>
<text x="490" y="282" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">根据失败信号、目标、benchmark</text>
<text x="490" y="305" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">config 产出 edit_plan</text>
<line x1="772" y1="295" x2="832" y2="295" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<rect x="832" y="210" width="310" height="170" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="832" y="210" width="8" height="170" rx="4" fill="#169b72"/>
<text x="860" y="249" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#17202a">3 持久化预览</text>
<text x="860" y="282" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">写</text>
<text x="860" y="305" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">proposal.json、edit_plan.</text>
<text x="860" y="328" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">json、candidate.patch</text>
<line x1="1142" y1="295" x2="1202" y2="295" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<rect x="1202" y="210" width="310" height="170" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="1202" y="210" width="8" height="170" rx="4" fill="#f28c28"/>
<text x="1230" y="249" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#17202a">4 应用或隔离执行</text>
<text x="1230" y="282" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">按 proposal/bounded/full</text>
<text x="1230" y="305" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">决定</text>
<text x="1230" y="328" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">preview、blocked、applied；必要时</text>
<text x="1230" y="351" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">copy staging</text>
<line x1="1357" y1="380" x2="247" y2="560" stroke="#17202a" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
<rect x="92" y="560" width="310" height="170" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="92" y="560" width="8" height="170" rx="4" fill="#0d8fa6"/>
<text x="120" y="599" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#17202a">5 preflight + benchmark</text>
<text x="120" y="632" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">先跑预检查，再由 adapter 执行</text>
<text x="120" y="655" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">repeat validation</text>
<line x1="402" y1="645" x2="462" y2="645" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<rect x="462" y="560" width="310" height="170" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="462" y="560" width="8" height="170" rx="4" fill="#d94b4b"/>
<text x="490" y="599" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#17202a">6 事务恢复</text>
<text x="490" y="632" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">默认还原候选改动，避免污染目标仓库</text>
<line x1="772" y1="645" x2="832" y2="645" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<rect x="832" y="560" width="310" height="170" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="832" y="560" width="8" height="170" rx="4" fill="#f5c542"/>
<text x="860" y="599" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#17202a">7 记录结果</text>
<text x="860" y="632" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">写</text>
<text x="860" y="655" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">registry、iterations、events，并更新</text>
<text x="860" y="678" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">state 指针</text>

<rect x="575" y="835" width="513" height="38" rx="19" fill="#e8f6ef" stroke="transparent" stroke-width="2"/>
<text x="831.5" y="860" text-anchor="middle" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="17" font-weight="700" fill="#169b72">默认 keep_applied_edits=false：跑完候选后恢复现场</text>
</svg>
