<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-label="候选生成为什么会越来越聚焦">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#17202a" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#14213d" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f7f9fc"/>
  <text x="70" y="72" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="38" font-weight="700" fill="#17202a">候选生成为什么会越来越聚焦</text>
  <text x="70" y="112" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="20" fill="#5f6b7a">生成器拿到的不只是源码，还有上一轮失败、回归、stage 和权限上下文。</text>
<rect x="110" y="195" width="360" height="190" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="110" y="195" width="8" height="190" rx="4" fill="#d94b4b"/>
<text x="138" y="234" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">最新失败信号</text>
<text x="138" y="267" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">latest_failure_summary</text>
<text x="138" y="291" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">latest_regression_summary</text>
<text x="138" y="315" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">task_keys / regressed_tasks</text>
<rect x="625" y="195" width="360" height="190" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="625" y="195" width="8" height="190" rx="4" fill="#2f6fed"/>
<text x="653" y="234" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">ProposalGenerationContext</text>
<text x="653" y="267" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">objective、stage、autonomy</text>
<text x="653" y="291" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">effective_config、benchmark_target</text>
<text x="653" y="315" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">latest_record_status</text>
<rect x="1140" y="195" width="360" height="190" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="1140" y="195" width="8" height="190" rx="4" fill="#7557d8"/>
<text x="1168" y="234" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">Generator Request</text>
<text x="1168" y="267" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">candidate_index、strategy_id</text>
<text x="1168" y="291" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">intervention_class</text>
<text x="1168" y="315" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">failure_focus /</text>
<text x="1168" y="338" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">regressed_tasks</text>
<text x="1168" y="362" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">hypothesis_seed</text>
<rect x="375" y="575" width="360" height="190" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="375" y="575" width="8" height="190" rx="4" fill="#f28c28"/>
<text x="403" y="614" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">Edit Plan JSON</text>
<text x="403" y="647" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">summary + operations</text>
<text x="403" y="671" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">输出必须能被 editing.py 解析</text>
<rect x="890" y="575" width="360" height="190" rx="14" fill="#ffffff" stroke="#c8d2df" stroke-width="2" filter="url(#shadow)"/>
<rect x="890" y="575" width="8" height="190" rx="4" fill="#169b72"/>
<text x="918" y="614" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#17202a">下一轮更聪明</text>
<text x="918" y="647" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">benchmark 结果回写 registry</text>
<text x="918" y="671" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="16" font-weight="400" fill="#5f6b7a">失败/回归被提炼后进入下一次 context</text>
<line x1="470" y1="290" x2="625" y2="290" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<line x1="985" y1="290" x2="1140" y2="290" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<line x1="1320" y1="385" x2="735" y2="575" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<line x1="735" y1="670" x2="890" y2="670" stroke="#17202a" stroke-width="2"  marker-end="url(#arrow)"/>
<line x1="1070" y1="575" x2="290" y2="385" stroke="#169b72" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
<rect x="580" y="815" width="448" height="38" rx="19" fill="#e8f6ef" stroke="transparent" stroke-width="2"/>
<text x="804" y="840" text-anchor="middle" font-family="PingFang SC, Noto Sans CJK SC, Arial, sans-serif" font-size="17" font-weight="700" fill="#169b72">反馈闭环：不是随机试错，而是失败聚焦 + 回归优先 + 策略选择</text>
</svg>
